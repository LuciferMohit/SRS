<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration System</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f9fafb;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            background-color: var(--surface);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .student-row {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Student Registration</h1>
                <p>Enter details to enroll a new student</p>
            </div>
            <form id="registrationForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. Jane Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="student@university.edu" required>
                </div>

                <div class="form-group">
                    <label for="course">Course / Major</label>
                    <select id="course" required>
                        <option value="" disabled selected>Select a course</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Artificial Intelligence">Artificial Intelligence</option>
                        <option value="Cloud Computing">Cloud Computing</option>
                        <option value="Game Development">Game Development</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Register Student</button>
            </form>
        </div>

        <div class="card">
            <div class="header">
                <h1>Enrolled Students</h1>
                <p>Database entries appear below</p>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Course</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state">
                    Loading database...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dynamically set API URL based on environment
        const getAPIUrl = () => {
            const hostname = window.location.hostname;
            
            // Local development
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return 'http://localhost:8000/students/';
            }
            
            // Production on Render or similar
            // Replace 'student-frontend' with 'student-api' in the URL
            const apiUrl = window.location.origin.replace('student-frontend', 'student-api');
            return apiUrl + '/students/';
        };
        
        const API_URL = getAPIUrl();

        async function loadStudents() {
            try {
                const response = await fetch(API_URL);
                const students = await response.json();
                
                const tableBody = document.getElementById('studentTableBody');
                const emptyState = document.getElementById('emptyState');
                
                tableBody.innerHTML = ''; // Clear table before loading

                if (students.length > 0) {
                    emptyState.style.display = 'none';
                    students.forEach(student => addStudentToTable(student));
                } else {
                    emptyState.style.display = 'block';
                    emptyState.innerText = 'No students registered yet.';
                }
            } catch (error) {
                document.getElementById('emptyState').innerText = 'Ensure Docker backend is running.';
                console.error("Error loading students:", error);
            }
        }

        function addStudentToTable(student) {
            const tableBody = document.getElementById('studentTableBody');
            const row = document.createElement('tr');
            row.className = 'student-row';
            row.innerHTML = `
                <td><strong>${student.name}</strong></td>
                <td>${student.email}</td>
                <td><span style="background: #e0e7ff; color: #4338ca; padding: 4px 10px; border-radius: 99px; font-size: 0.85rem; font-weight: 500;">${student.course}</span></td>
            `;
            tableBody.appendChild(row);
        }
